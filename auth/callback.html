<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Autenticando con Microsoft...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #1C1C1E;
      color: #8E8E93;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #FF9500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; }
    .error { color: #FF453A; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Completando autenticación...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error_description') || params.get('error');
    const state  = params.get('state');

    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(
        { type: 'MS_AUTH_CODE', code: code || null, error: error || null, state },
        window.location.origin
      );
      document.getElementById('msg').textContent = 'Autenticación completada. Cerrando...';
      setTimeout(() => window.close(), 800);
    } else {
      document.getElementById('spinner').style.display = 'none';
      const p = document.getElementById('msg');
      p.className = 'error';
      p.textContent = 'Error: ventana de origen no disponible. Puedes cerrar esta ventana.';
    }
  </script>
</body>
</html>
